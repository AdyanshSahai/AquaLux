okay; ============================================================
;  AquaLux — PlatformIO Configuration
;  Target : ESP32-S2 Mini (LOLIN / Wemos S2 Mini)
;  Framework: Arduino
; ============================================================

[env:lolin_s2_mini]
platform  = espressif32       ; Espressif ESP32 Arduino platform
board     = lolin_s2_mini     ; LOLIN S2 Mini — ESP32-S2 single-core Xtensa LX7
framework = arduino           ; Arduino framework (not ESP-IDF)

; Serial monitor baud rate — must match Serial.begin() in main.cpp
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3      ; Enable ESP-IDF info-level logs (helps debug WiFi / NTP issues)

; Library dependencies
; Using GitHub URLs for AsyncTCP and ESPAsyncWebServer — registry versions
; can lag behind; URLs pull the latest stable commits directly.
lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git           ; Async TCP stack (required by ESPAsyncWebServer)
    https://github.com/me-no-dev/ESPAsyncWebServer.git  ; Non-blocking HTTP server
    arduino-libraries/NTPClient                          ; High-level NTP time client
    ; WiFi, WiFiUdp, and Preferences are part of the ESP32 Arduino core — no entry needed here
